name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          # pnpm is provided by corepack in the next step, so it isn't on PATH
          # when setup-node runs. Disable its package-manager cache probe, which
          # would otherwise fail with "Unable to locate executable file: pnpm".
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: docker compose up -d
      - run: docker compose ps
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm openapi:check
      - if: always()
        run: docker compose down
